<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录智能博客助手</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            background: #eef2f7;
            color: #1f2937;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        .auth-card {
            width: min(460px, 100%);
            background: #ffffff;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            padding: 28px;
        }
        h1 {
            margin: 0 0 8px;
            color: #1f4f8f;
            font-size: 26px;
        }
        .hint {
            margin: 0 0 20px;
            color: #64748b;
            line-height: 1.65;
        }
        .demo-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 18px;
        }
        .demo-box strong { color: #1f4f8f; }
        .demo-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 8px;
            color: #334155;
            font-size: 14px;
        }
        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: 700;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1f4f8f;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .demo-button {
            margin-top: 12px;
            background: #16a34a;
        }
        .error {
            padding: 10px 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            border-radius: 8px;
            margin-bottom: 14px;
        }
        .footer {
            margin-top: 16px;
            color: #64748b;
            text-align: center;
        }
        a { color: #1f4f8f; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <main class="auth-card">
        <h1>登录智能博客助手</h1>
        <p class="hint">进入系统后，可以体验大模型意图识别、文章推荐、用户画像和反馈记录。</p>

        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}

        <div class="demo-box">
            <strong>演示账号已准备好</strong>
            <div class="demo-row"><span>账号</span><code>{{ demo_username }}</code></div>
            <div class="demo-row"><span>密码</span><code>{{ demo_password }}</code></div>
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ next }}">
                <input type="hidden" name="demo_login" value="1">
                <button class="demo-button" type="submit">一键进入演示系统</button>
            </form>
        </div>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <label for="username">用户名</label>
            <input id="username" name="username" autocomplete="username" value="{{ demo_username }}" required>
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" value="{{ demo_password }}" required>
            <button type="submit">登录</button>
        </form>

        <div class="footer">
            也可以 <a href="/accounts/register/?next={{ next|urlencode }}">注册新账号</a> 单独体验用户画像。
        </div>
    </main>
</body>
</html>
