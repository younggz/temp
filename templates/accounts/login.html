<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录智能助手</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 18px;
            background: #eef2f7;
            color: #1f2937;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        .auth-card {
            width: min(420px, 100%);
            background: #ffffff;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
            padding: 28px;
        }
        h1 {
            margin: 0 0 8px;
            color: #1f4f8f;
            font-size: 26px;
        }
        .hint {
            margin: 0 0 22px;
            color: #64748b;
            line-height: 1.6;
        }
        label {
            display: block;
            margin: 14px 0 6px;
            font-weight: 700;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1f4f8f;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }
        .error {
            padding: 10px 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            border-radius: 8px;
            margin-bottom: 14px;
        }
        .footer {
            margin-top: 16px;
            color: #64748b;
            text-align: center;
        }
        a { color: #1f4f8f; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <main class="auth-card">
        <h1>登录智能助手</h1>
        <p class="hint">登录后，系统会按用户记录你的提问、意图识别结果和反馈。</p>

        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <label for="username">用户名</label>
            <input id="username" name="username" autocomplete="username" required>
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">登录</button>
        </form>

        <div class="footer">
            还没有账号？<a href="/accounts/register/?next={{ next|urlencode }}">立即注册</a>
        </div>
    </main>
</body>
</html>
