{% extends 'base.html' %}

{% block title %}{% if operator_mode %}扫码使用{% else %}智能助手{% endif %}{% endblock %}

{% block extra_css %}
<style>
    body {
        padding: 0;
        background: #eef2f7;
    }

    .container {
        min-height: 100vh;
        padding: 18px;
    }

    header {
        display: none;
    }

    {% if operator_mode %}
    .container {
        max-width: 760px;
        display: flex;
        align-items: center;
    }

    .content {
        width: 100%;
    }

    .chat-container {
        display: none;
    }

    .share-card {
        text-align: center;
    }

    .share-card img {
        width: 260px;
        height: 260px;
        image-rendering: pixelated;
        margin: 16px auto;
        display: block;
    }

    .share-url {
        padding: 12px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 8px;
        color: #1f4f8f;
        font-weight: 700;
        word-break: break-all;
        margin-top: 12px;
    }
    {% else %}
    .container {
        max-width: 860px;
        display: flex;
        align-items: stretch;
    }

    .content {
        display: none;
    }

    .chat-container {
        width: 100%;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: calc(100vh - 36px);
    }

    .chat-container h2 {
        font-size: 24px;
    }

    .chat-box {
        flex: 1;
        min-height: 420px;
        max-height: none;
    }

    .input-group input {
        font-size: 16px;
    }

    .input-group button {
        min-width: 96px;
        font-size: 16px;
    }
    {% endif %}

    @media (max-width: 560px) {
        .container {
            padding: 10px;
        }

        .chat-container {
            min-height: calc(100vh - 20px);
            padding: 16px;
        }

        .chat-box {
            min-height: 360px;
        }
    }
</style>
{% endblock %}

{% block content %}
{% if operator_mode %}
<div class="share-card">
    <h2 class="section-title">扫码使用智能助手</h2>
    <img src="{{ qr_url }}" alt="扫码打开智能助手">
    <div class="share-url">{{ public_url }}</div>
</div>
{% endif %}
{% endblock %}
