{% extends 'base.html' %}

{% block title %}{{ post.title }} - 智能博客系统{% endblock %}

{% block content %}
<article>
    <h2 style="margin-bottom: 15px; color: #333;">{{ post.title }}</h2>
    <div class="meta" style="color: #666; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #e0e0e0;">
        🕐 发布时间：{{ post.created_time|date:"Y-m-d H:i" }}
    </div>
    <div style="line-height: 1.8; color: #333; font-size: 16px;">
        {{ post.content|linebreaks }}
    </div>
</article>

<div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
    <a href="/" class="btn">← 返回首页</a>
    <a href="/posts/" class="btn" style="margin-left: 10px;">文章列表</a>
</div>
{% endblock %}
